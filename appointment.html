<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment – HealthCare Hospital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="bg-white shadow-lg sticky top-0 z-50">...</nav> <!-- copy navbar -->

    <section class="bg-gradient-to-r from-teal-600 to-teal-700 text-white py-16">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Book an Appointment</h1>
            <p class="text-xl">Schedule your visit with our expert doctors. We're here to provide you with the best care possible.</p>
        </div>
    </section>

    <section class="py-16">
        <div class="max-w-3xl mx-auto px-4 bg-white rounded-2xl shadow-xl p-8">
            <form id="appointment-form">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="block text-gray-700 font-semibold mb-2">Full Name <span class="text-red-500">*</span></label><input type="text" id="fullName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-teal-500"><p class="error text-red-500 text-sm mt-1 hidden" id="nameError"></p></div>
                    <div><label class="block text-gray-700 font-semibold mb-2">Email <span class="text-red-500">*</span></label><input type="email" id="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg"><p class="error text-red-500 text-sm mt-1 hidden" id="emailError"></p></div>
                    <div><label class="block text-gray-700 font-semibold mb-2">Phone <span class="text-red-500">*</span></label><input type="tel" id="phone" class="w-full px-4 py-2 border border-gray-300 rounded-lg"><p class="error text-red-500 text-sm mt-1 hidden" id="phoneError"></p></div>
                    <div><label class="block text-gray-700 font-semibold mb-2">Department <span class="text-red-500">*</span></label><select id="department" class="w-full px-4 py-2 border border-gray-300 rounded-lg"><option value="">Select</option><option>Cardiology</option><option>Neurology</option><option>Pediatrics</option><option>Orthopedics</option><option>General Medicine</option></select><p class="error text-red-500 text-sm mt-1 hidden" id="deptError"></p></div>
                    <div><label class="block text-gray-700 font-semibold mb-2">Date <span class="text-red-500">*</span></label><input type="date" id="date" class="w-full px-4 py-2 border border-gray-300 rounded-lg"><p class="error text-red-500 text-sm mt-1 hidden" id="dateError"></p></div>
                    <div><label class="block text-gray-700 font-semibold mb-2">Time <span class="text-red-500">*</span></label><input type="time" id="time" class="w-full px-4 py-2 border border-gray-300 rounded-lg"><p class="error text-red-500 text-sm mt-1 hidden" id="timeError"></p></div>
                </div>
                <div class="mt-4"><label class="block text-gray-700 font-semibold mb-2">Message (Symptoms)</label><textarea id="message" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg"></textarea></div>
                <button type="submit" class="mt-6 w-full bg-teal-600 text-white font-semibold py-3 rounded-lg hover:bg-teal-700 transition">Book Appointment</button>
            </form>
            <div id="success-message" class="hidden mt-4 p-4 bg-green-100 text-green-700 rounded-lg text-center"></div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white mt-16">...</footer>
    <script src="js/main.js"></script>
    <script>
        // Form validation (vanilla JS)
        document.getElementById('appointment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            let isValid = true;
            
            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.classList.add('hidden'));
            
            const fullName = document.getElementById('fullName').value.trim();
            if (fullName.length < 3) {
                document.getElementById('nameError').textContent = 'Name must be at least 3 characters';
                document.getElementById('nameError').classList.remove('hidden');
                isValid = false;
            }
            
            const email = document.getElementById('email').value.trim();
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                document.getElementById('emailError').textContent = 'Valid email required';
                document.getElementById('emailError').classList.remove('hidden');
                isValid = false;
            }
            
            const phone = document.getElementById('phone').value.trim();
            if (phone.length < 10) {
                document.getElementById('phoneError').textContent = 'Phone number must be at least 10 digits';
                document.getElementById('phoneError').classList.remove('hidden');
                isValid = false;
            }
            
            const dept = document.getElementById('department').value;
            if (!dept) {
                document.getElementById('deptError').textContent = 'Please select a department';
                document.getElementById('deptError').classList.remove('hidden');
                isValid = false;
            }
            
            const date = document.getElementById('date').value;
            if (!date) {
                document.getElementById('dateError').textContent = 'Date required';
                document.getElementById('dateError').classList.remove('hidden');
                isValid = false;
            } else {
                const selected = new Date(date);
                const today = new Date();
                today.setHours(0,0,0,0);
                if (selected < today) {
                    document.getElementById('dateError').textContent = 'Please select a future date';
                    document.getElementById('dateError').classList.remove('hidden');
                    isValid = false;
                }
            }
            
            const time = document.getElementById('time').value;
            if (!time) {
                document.getElementById('timeError').textContent = 'Time required';
                document.getElementById('timeError').classList.remove('hidden');
                isValid = false;
            }
            
            if (isValid) {
                document.getElementById('success-message').textContent = '✅ Appointment request sent! We will contact you within 24 hours.';
                document.getElementById('success-message').classList.remove('hidden');
                this.reset();
                setTimeout(() => document.getElementById('success-message').classList.add('hidden'), 5000);
            }
        });
    </script>
</body>
</html>
