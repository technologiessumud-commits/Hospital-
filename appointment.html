<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment – HealthCare Hospital</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-gray-50 font-sans">

<!-- ✅ Navbar (WORKING) -->
<nav class="bg-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4">
        <div class="flex justify-between items-center py-4">

            <div class="flex items-center space-x-2">
                <div class="w-10 h-10 bg-teal-600 rounded-full flex items-center justify-center">
                    <span class="text-white font-bold">H</span>
                </div>
                <span class="text-xl font-bold text-teal-600">HealthCare</span>
            </div>

            <div class="hidden md:flex space-x-6">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="services.html">Services</a>
                <a href="doctors.html">Doctors</a>
                <a href="appointment.html" class="text-teal-600 font-bold">Appointment</a>
                <a href="contact.html">Contact</a>
            </div>

            <button id="menu-btn" class="md:hidden text-2xl">
                <i class="fas fa-bars"></i>
            </button>
        </div>

        <div id="mobile-menu" class="hidden md:hidden">
            <a href="index.html" class="block py-2">Home</a>
            <a href="about.html" class="block py-2">About</a>
            <a href="services.html" class="block py-2">Services</a>
            <a href="doctors.html" class="block py-2">Doctors</a>
            <a href="appointment.html" class="block py-2 text-teal-600">Appointment</a>
            <a href="contact.html" class="block py-2">Contact</a>
        </div>
    </div>
</nav>

<!-- Hero -->
<section class="bg-gradient-to-r from-teal-600 to-teal-700 text-white py-16 text-center">
    <h1 class="text-4xl font-bold mb-4">Book an Appointment</h1>
    <p>Schedule your visit with our expert doctors.</p>
</section>

<!-- Form -->
<section class="py-16">
    <div class="max-w-3xl mx-auto px-4 bg-white rounded-2xl shadow-xl p-8">

        <form id="appointment-form">

            <div class="grid md:grid-cols-2 gap-4">

                <div>
                    <label>Full Name *</label>
                    <input type="text" id="fullName" class="w-full border p-2 rounded">
                    <p class="error text-red-500 hidden" id="nameError"></p>
                </div>

                <div>
                    <label>Email *</label>
                    <input type="email" id="email" class="w-full border p-2 rounded">
                    <p class="error text-red-500 hidden" id="emailError"></p>
                </div>

                <div>
                    <label>Phone *</label>
                    <input type="tel" id="phone" class="w-full border p-2 rounded">
                    <p class="error text-red-500 hidden" id="phoneError"></p>
                </div>

                <div>
                    <label>Department *</label>
                    <select id="department" class="w-full border p-2 rounded">
                        <option value="">Select</option>
                        <option>Cardiology</option>
                        <option>Neurology</option>
                        <option>Pediatrics</option>
                        <option>Orthopedics</option>
                    </select>
                    <p class="error text-red-500 hidden" id="deptError"></p>
                </div>

                <div>
                    <label>Date *</label>
                    <input type="date" id="date" class="w-full border p-2 rounded">
                    <p class="error text-red-500 hidden" id="dateError"></p>
                </div>

                <div>
                    <label>Time *</label>
                    <input type="time" id="time" class="w-full border p-2 rounded">
                    <p class="error text-red-500 hidden" id="timeError"></p>
                </div>

            </div>

            <button class="mt-6 w-full bg-teal-600 text-white py-3 rounded">
                Book Appointment
            </button>

        </form>

        <div id="success-message" class="hidden mt-4 bg-green-100 p-4 text-center"></div>

    </div>
</section>

<!-- Footer -->
<footer class="bg-gray-900 text-white text-center py-6">
    <p>&copy; 2024 HealthCare Hospital</p>
</footer>

<!-- ✅ Hamburger Fix -->
<script>
const menuBtn = document.getElementById('menu-btn');
const mobileMenu = document.getElementById('mobile-menu');
const icon = menuBtn.querySelector('i');

menuBtn.addEventListener('click', () => {
    mobileMenu.classList.toggle('hidden');

    if (mobileMenu.classList.contains('hidden')) {
        icon.classList.replace('fa-times','fa-bars');
    } else {
        icon.classList.replace('fa-bars','fa-times');
    }
});
</script>

<!-- ✅ YOUR ORIGINAL VALIDATION (UNCHANGED) -->
<script>
document.getElementById('appointment-form').addEventListener('submit', function(e) {
    e.preventDefault();
    let isValid = true;

    document.querySelectorAll('.error').forEach(el => el.classList.add('hidden'));

    const fullName = document.getElementById('fullName').value.trim();
    if (fullName.length < 3) {
        nameError.textContent = 'Name must be at least 3 characters';
        nameError.classList.remove('hidden');
        isValid = false;
    }

    const email = document.getElementById('email').value.trim();
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(email)) {
        emailError.textContent = 'Valid email required';
        emailError.classList.remove('hidden');
        isValid = false;
    }

    if (isValid) {
        success-message.textContent = 'Appointment booked!';
        success-message.classList.remove('hidden');
    }
});
</script>

</body>
</html>
